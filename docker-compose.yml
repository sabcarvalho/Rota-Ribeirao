services:
  admin-module:
    build: ./admin-module
    container_name: rr-admin-api
    ports:
      - "8003:8000"
    env_file:
      - .env
  places-api:
    build: ./places-service
    container_name: rr-places-api
    ports:
      - "8000:8000"
    env_file:
      - .env

  reviews-api:
    build: ./reviews-service
    container_name: rr-reviews-api
    ports:
      - "8001:8000"
    env_file:
      - .env

  recommendation-api:
    build: ./recommendation-service
    container_name: rr-recommendation-api
    env_file:
      - .env
    ports:
      - "8002:8000"

  frontend:
    build: ./frontend
    container_name: rr-frontend
    ports:
      - "5173:5173"
    depends_on:
      - places-api
      - reviews-api
    # A diretiva 'environment' foi removida, o Vite lerá do seu próprio .env